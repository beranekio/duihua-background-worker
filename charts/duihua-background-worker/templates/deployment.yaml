{{- if .Values.enabled }}
{{- $_ := include "duihua-background-worker.validate.config" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "duihua-background-worker.fullname" . }}
  labels:
    {{- include "duihua-background-worker.labels" . | nindent 4 }}
spec:
  {{- if ne (include "duihua-background-worker.autoscaling.enabled" .) "true" }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "duihua-background-worker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "duihua-background-worker.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "duihua-background-worker.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
        - name: background-worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: RESPONSES_API_STORE_ENDPOINT
              value: {{ .Values.responsesApiStore.endpoint | quote }}
            - name: RESPONSE_ID_STORE_TTL_SECONDS
              value: {{ .Values.responsesApiStore.responseIdStoreTtlSeconds | quote }}
            - name: BACKGROUND_QUEUE_CONSUMER_GROUP
              value: {{ .Values.consumerGroup | quote }}
            - name: BACKGROUND_QUEUE_CONSUMER_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: BACKGROUND_QUEUE_BLOCK_MS
              value: {{ .Values.blockMs | quote }}
            - name: BACKGROUND_QUEUE_PENDING_RETRY_SECONDS
              value: {{ .Values.pendingRetrySeconds | quote }}
            - name: BACKGROUND_QUEUE_MAX_CONCURRENT_JOBS
              value: {{ .Values.maxConcurrentJobs | quote }}
            - name: BACKGROUND_UPSTREAM_TIMEOUT_SECONDS
              value: {{ .Values.upstreamTimeoutSeconds | quote }}
            {{- $secret := .Values.upstreamApiKeySecret | default dict }}
            {{- if $secret.name }}
            - name: UPSTREAM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secret.name | quote }}
                  key: {{ required "upstreamApiKeySecret.key is required when upstreamApiKeySecret.name is set" $secret.key | quote }}
            {{- else if .Values.upstreamApiKey }}
            - name: UPSTREAM_API_KEY
              value: {{ .Values.upstreamApiKey | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}