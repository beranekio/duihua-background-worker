name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache cargo artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "35.0"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

  helm:
    name: Helm chart validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Lint chart
        run: helm lint charts/duihua-background-worker

      - name: Render templates
        run: |
          helm template duihua-background-worker charts/duihua-background-worker \
            --set responsesApiStore.endpoint=http://responses-api-store:50051 \
            --debug > /tmp/helm-rendered.yaml

  dockerfile:
    name: Dockerfile lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: duihua-background-worker:ci

      - name: Export image tarball
        run: docker save duihua-background-worker:ci -o duihua-background-worker-ci.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: duihua-background-worker-ci-image
          path: duihua-background-worker-ci.tar
          retention-days: 1

  integration:
    name: Integration smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache cargo artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "35.0"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Build worker
        run: cargo build --release

      - name: Run unit tests
        run: cargo test

  helm-smoke:
    name: Helm chart smoke test (kind)
    runs-on: ubuntu-latest
    needs: docker-build
    timeout-minutes: 30
    env:
      CLUSTER_NAME: duihua-background-worker-smoke
      KUBECTL_CONTEXT: kind-duihua-background-worker-smoke
      MANAGE_KIND_CLUSTER: "false"
      SKIP_DOCKER_BUILD: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: duihua-background-worker-ci-image

      - name: Load image
        run: docker load -i duihua-background-worker-ci.tar

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Run Helm kind smoke test
        run: ./scripts/helm-smoke-kind.sh